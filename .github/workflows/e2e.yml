name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # — Qualité du code —
      - name: Lint (ESLint) — erreurs de code
        run: npm run lint

      - name: Format (Prettier) — uniformité du style
        run: npm run format:check

      # — Tests —
      - name: Unit tests (Vitest) — logique métier
        run: npm test -- --run

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: E2E tests (Playwright) — parcours utilisateur
        run: npx playwright test
        env:
          CI: true
          VITE_MISTRAL_API_KEY: ${{ secrets.VITE_MISTRAL_API_KEY }}

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7
